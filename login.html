<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход — TourStat KG</title>
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;800&family=Geologica:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0e14;
      --surface: #111720;
      --border: rgba(255,255,255,0.07);
      --accent: #00e5a0;
      --text: #e8edf5;
      --muted: #5a6880;
      --error: #ff4d4d;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Geologica', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* Animated grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,229,160,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,160,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }

    /* Glow blob */
    body::after {
      content: '';
      position: fixed;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(0,229,160,0.06) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .login-wrap {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      padding: 1rem;
    }

    .login-logo {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .login-logo h1 {
      font-family: 'Unbounded', sans-serif;
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .login-logo h1 span { color: var(--accent); }

    .login-logo p {
      color: var(--muted);
      font-size: 0.82rem;
      margin-top: 6px;
    }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2rem;
    }

    .login-card h2 {
      font-family: 'Unbounded', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
      letter-spacing: -0.01em;
    }

    .field {
      margin-bottom: 1rem;
    }

    .field label {
      display: block;
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .field input {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      color: var(--text);
      font-family: 'Geologica', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .field input:focus {
      border-color: rgba(0,229,160,0.4);
    }

    .field input::placeholder { color: var(--muted); }

    .btn-login {
      width: 100%;
      margin-top: 0.5rem;
      background: var(--accent);
      color: #0a0e14;
      border: none;
      border-radius: 10px;
      padding: 13px;
      font-family: 'Unbounded', sans-serif;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    .btn-login:hover { opacity: 0.9; }
    .btn-login:active { transform: scale(0.98); }
    .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }

    .error-msg {
      background: rgba(255,77,77,0.1);
      border: 1px solid rgba(255,77,77,0.3);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.82rem;
      color: var(--error);
      margin-top: 1rem;
      display: none;
    }

    .error-msg.show { display: block; }

    .login-footer {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.75rem;
      color: var(--muted);
    }

    .login-footer span { color: var(--accent); }
  </style>
</head>
<body>

<div class="login-wrap">
  <div class="login-logo">
    <h1>Tour<span>Stat</span> KG</h1>
    <p>Туристическая аналитика Кыргызстана</p>
  </div>

  <div class="login-card">
    <h2>Вход в систему</h2>

    <div class="field">
      <label>Email</label>
      <input type="email" id="email" placeholder="your@company.kg" autocomplete="email">
    </div>

    <div class="field">
      <label>Пароль</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>

    <button class="btn-login" id="loginBtn" onclick="login()">ВОЙТИ</button>

    <div class="error-msg" id="errorMsg"></div>
  </div>

  <div class="login-footer">
    Доступ предоставляется администратором<br>
    Свяжитесь с нами: <span>info@tourstat.kg</span>
  </div>
</div>

<script>
  const API = 'http://localhost:3001/api';

  // Если уже залогинен — сразу на дашборд
  if (localStorage.getItem('token')) {
    window.location.href = 'index.html';
  }

  // Enter чтобы войти
  document.getElementById('password').addEventListener('keydown', e => {
    if (e.key === 'Enter') login();
  });

  async function login() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('loginBtn');
    const err = document.getElementById('errorMsg');

    err.classList.remove('show');

    if (!email || !password) {
      showError('Введите email и пароль');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'ВХОДИМ...';

    try {
      const res = await fetch(`${API}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });

      const data = await res.json();

      if (!data.success) {
        showError(data.error || 'Ошибка входа');
        return;
      }

      localStorage.setItem('token', data.token);
      localStorage.setItem('user', JSON.stringify(data.user));
      window.location.href = 'index.html';

    } catch (e) {
      showError('Нет соединения с сервером. Убедитесь что бэкенд запущен.');
    } finally {
      btn.disabled = false;
      btn.textContent = 'ВОЙТИ';
    }
  }

  function showError(msg) {
    const err = document.getElementById('errorMsg');
    err.textContent = msg;
    err.classList.add('show');
  }
</script>
</body>
</html>
